<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>社區案件看版 (Web版)</title>
    <!-- 引入 Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🏢 社區專屬案件儀表板</h1>
            <p class="subtitle">隨時隨地，一手掌握社區動態</p>
        </header>

        <section class="add-task-section">
            <div class="card form-card">
                <h2>✨ 新增待辦事項</h2>
                <form id="taskForm">
                    <div class="form-group">
                        <label>項目內容</label>
                        <input type="text" id="taskName" required placeholder="例如：B棟電梯異音檢查">
                    </div>
                    <div class="form-group-row">
                        <div class="form-group half">
                            <label>負責物業人員</label>
                            <input type="text" id="taskPerson" placeholder="例如：張主任">
                        </div>
                        <div class="form-group half">
                            <label>預計回覆日</label>
                            <input type="date" id="taskDeadline" required>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary">建立事項</button>
                </form>
            </div>
        </section>

        <section class="task-list-section">
            <div class="filters">
                <button class="filter-btn active" data-filter="all">全部事項</button>
                <button class="filter-btn" data-filter="pending">處理中</button>
                <button class="filter-btn" data-filter="completed">已完成</button>
            </div>
            
            <div id="tasksContainer" class="tasks-grid">
                <!-- 卡片將由 JS 動態生成 -->
            </div>
        </section>
    </div>

    <!-- 範本: 每一個任務卡片 -->
    <template id="taskCardTemplate">
        <div class="task-card">
            <div class="card-header">
                <span class="badge status-badge">處理中</span>
                <span class="deadline-badge"></span>
            </div>
            <h3 class="task-title"></h3>
            <div class="task-details">
                <p>👤 負責人: <span class="task-person"></span></p>
            </div>
            <div class="card-actions">
                <button class="btn-action complete-btn">✓ 標示完成</button>
                <button class="btn-action delete-btn">🗑 刪除</button>
            </div>
        </div>
    </template>

    <script src="/static/main.js"></script>
</body>
</html>
